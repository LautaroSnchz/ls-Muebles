<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
    <title>Ls Design</title>
    <script src="https://kit.fontawesome.com/df59baf6b8.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="img/logo.svg" type="image/png">
    
</head>
<body>
    <header>
        <div class="container">
            <p class="logo">LS-Muebles</p>
            <nav>
                <a href="index.html">Inicio</a>
                <a href="#" class="active">Productos</a>
                <a href="contacto.html">Contacto</a>
                <a href="ofertas.html">Ofertas</a>
                <a href="solicitar-asesoramiento.html">Asesorate</a>
            </nav>
        </div>
    </header>

    <div class="productos-bar">
        <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
            <h2>Productos en Stock</h2>
            <div class="controles-productos d-flex align-items-center gap-3">
                <div class="filtro-wrapper">
                    <i class="fas fa-filter"></i>
                    <select id="filtroMueble">
                        <option value="all">Todos los productos</option>
                        <option value="mesa">Mesas</option>
                        <option value="silla">Sillas</option>
                        <option value="cama">Camas</option>
                    </select>
                </div>
                <button id="boton-carrito" class="btn-carrito">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="contadorCarrito">0</span>
                </button>
            </div>
        </div>
    </div>


    <main id="contenedor-productos">

    </main>

    <div class="modal-contenedor" id="modal-carrito">
        <div class="modal-carrito">
            <h3>Carrito de Compras</h3>
            <button id="carritoCerrar" class="boton-cerrar"><i class="fas fa-times-circle"></i></button>
            <div id="carrito-contenedor">
            </div>
            <p class="precioProducto" style="font-weight: bold; margin-top: 15px;">Precio total: $<span id="precioTotal">0</span></p>
            <button id="vaciar-carrito" class="boton-agregar" style="width: 100%; margin-top: 10px;">Vaciar carrito</button>
        </div>
    </div>
    
    <footer>
        <a href="https://facebook.com"><img class="redes" src="img/facebook.svg"></a>
        <a href="https://instagram.com"><img class="redes" src="img/instagram.svg"></a>
        <a href="https://www.tiktok.com"><img class="redes" src="img/tiktok.svg"></a>
        <div class="container">
            <p>&copy;Ls Muebles 2024</p>
        </div>
    </footer>
<script defer src="stock.js"></script>

<script defer src="app.js"></script>
</body>
</html>
